<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="影視" />
    <meta name="theme-color" content="#050507" />
    <link rel="icon" href="../assets/icon.png" />
    <link rel="apple-touch-icon" href="../assets/icon.png" />
    <title>影視 OKTV iPhone</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050507;
        --panel: rgba(16, 17, 20, 0.88);
        --panel-strong: rgba(24, 25, 30, 0.94);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f5f5f7;
        --muted: #b8b8bf;
        --dim: #7d8089;
        --accent: #9a0f45;
        --accent-2: #c4145f;
        --cyan: #35d9ea;
        --green: #59d68d;
        --amber: #f0bd5a;
        --red: #ff6571;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          linear-gradient(90deg, rgba(5, 5, 7, 0.96), rgba(5, 5, 7, 0.9)),
          url("../assets/hero-cinema.png") right top / auto 100vh fixed no-repeat,
          var(--bg);
        color: var(--text);
        font-family:
          "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        overflow-x: hidden;
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .app {
        width: min(100%, 1180px);
        min-height: 100vh;
        margin: 0 auto;
        padding: max(12px, env(safe-area-inset-top)) 12px max(28px, env(safe-area-inset-bottom));
      }

      .top-nav {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 20px;
        min-height: 72px;
        overflow-x: auto;
        padding: 8px 0 12px;
        background: linear-gradient(180deg, rgba(5, 5, 7, 0.98), rgba(5, 5, 7, 0.72));
        backdrop-filter: blur(14px);
        scrollbar-width: none;
      }

      .top-nav::-webkit-scrollbar,
      .poster-grid::-webkit-scrollbar,
      .chip-row::-webkit-scrollbar {
        display: none;
      }

      .nav-btn {
        flex: 0 0 auto;
        min-height: 46px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: rgba(255, 255, 255, 0.72);
        padding: 0 10px;
        font-size: clamp(1.04rem, 5.4vw, 1.72rem);
        font-weight: 600;
        white-space: nowrap;
        cursor: pointer;
      }

      .nav-btn.is-active {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        padding: 0 22px;
        font-weight: 900;
      }

      .nav-btn svg,
      .icon-btn svg,
      .play-btn svg,
      .status-pill svg {
        width: 20px;
        height: 20px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        margin: 0 0 14px;
      }

      .search {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        padding: 0 12px;
        outline: none;
      }

      .search:focus {
        border-color: rgba(196, 20, 95, 0.8);
      }

      .icon-btn,
      .play-btn {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
      }

      .icon-btn {
        width: 42px;
      }

      .hero-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 16px;
      }

      .metric {
        min-height: 86px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.035));
        padding: 12px;
      }

      .metric strong {
        display: block;
        font-size: clamp(1.55rem, 8vw, 2.4rem);
        line-height: 1;
      }

      .metric span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 10px 0 12px;
      }

      .section-head h1,
      .section-head h2 {
        margin: 0;
        font-size: clamp(1.15rem, 6vw, 1.65rem);
      }

      .section-head span {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .poster-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .poster-card {
        min-width: 0;
        border: 0;
        background: transparent;
        color: inherit;
        padding: 0;
        text-align: left;
        cursor: pointer;
      }

      .poster-art {
        position: relative;
        aspect-ratio: 0.72;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.2)),
          var(--poster-bg, linear-gradient(135deg, #123949, #17202a));
      }

      .poster-art::before {
        content: "";
        position: absolute;
        inset: -18%;
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.28), transparent 12%),
          repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.08) 0 2px, transparent 2px 18px);
        transform: rotate(-8deg);
      }

      .poster-art strong {
        position: absolute;
        inset: auto 10px 40px;
        z-index: 2;
        font-size: clamp(1.45rem, 7vw, 2.6rem);
        line-height: 1.05;
        letter-spacing: 0;
        text-align: center;
        text-shadow: 0 4px 18px rgba(0, 0, 0, 0.55);
        overflow-wrap: anywhere;
      }

      .poster-art .badge,
      .poster-art .score {
        position: absolute;
        z-index: 3;
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        border-radius: 6px;
        background: rgba(34, 34, 38, 0.78);
        color: #fff;
        padding: 0 8px;
        font-size: 1rem;
      }

      .poster-art .badge {
        left: 8px;
        bottom: 8px;
      }

      .poster-art .score {
        left: 8px;
        top: 8px;
      }

      .poster-title {
        display: block;
        margin-top: 8px;
        overflow: hidden;
        color: #fff;
        font-size: 1rem;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .poster-meta {
        display: flex;
        gap: 7px;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .chip-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        margin-bottom: 12px;
      }

      .chip {
        flex: 0 0 auto;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
        padding: 0 12px;
        cursor: pointer;
      }

      .chip.is-active {
        border-color: rgba(196, 20, 95, 0.75);
        background: rgba(196, 20, 95, 0.24);
        color: #fff;
      }

      .row-list {
        display: grid;
        gap: 8px;
      }

      .list-row {
        min-height: 66px;
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px;
      }

      .avatar {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: rgba(196, 20, 95, 0.28);
        color: #fff;
        font-weight: 900;
      }

      .list-main {
        min-width: 0;
      }

      .list-main strong,
      .list-main span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .list-main span {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .play-btn {
        min-width: 72px;
        padding: 0 10px;
      }

      .play-btn:disabled {
        cursor: not-allowed;
        opacity: 0.42;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .status-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-strong);
        padding: 12px;
      }

      .status-card strong,
      .status-card span {
        display: block;
      }

      .status-card span {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.82rem;
        overflow-wrap: anywhere;
      }

      .status-pill {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 0 10px;
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
        font-size: 0.78rem;
      }

      .status-pill.ok {
        background: rgba(89, 214, 141, 0.18);
        color: var(--green);
      }

      .status-pill.warn {
        background: rgba(240, 189, 90, 0.18);
        color: var(--amber);
      }

      .player-sheet {
        position: fixed;
        inset: 0;
        z-index: 60;
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .player-sheet.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .player-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.68);
        backdrop-filter: blur(8px);
      }

      .player-panel {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: min(100%, 720px);
        transform: translateX(-50%);
        border: 1px solid var(--line);
        border-bottom: 0;
        border-radius: 8px 8px 0 0;
        background: #07070a;
        padding: 12px 12px max(14px, env(safe-area-inset-bottom));
      }

      .player-head {
        min-height: 48px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .player-head strong,
      .player-head span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player-head span {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        background: #000;
      }

      .notice {
        border: 1px solid rgba(240, 189, 90, 0.34);
        border-radius: 8px;
        background: rgba(240, 189, 90, 0.1);
        color: #ffd992;
        padding: 10px 12px;
        font-size: 0.86rem;
        line-height: 1.5;
      }

      .hidden {
        display: none !important;
      }

      @media (min-width: 620px) {
        .poster-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (min-width: 980px) {
        .poster-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .app {
          padding-inline: 28px;
        }

        .hero-strip {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 430px) {
        .top-nav {
          gap: 12px;
        }

        .hero-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .poster-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .status-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <nav class="top-nav" aria-label="OKTV 分類" id="topNav"></nav>
      <div id="screen"></div>
    </div>

    <div class="player-sheet" id="playerSheet" aria-hidden="true">
      <div class="player-backdrop" data-close-player></div>
      <section class="player-panel">
        <div class="player-head">
          <div>
            <strong id="playerTitle">影視</strong>
            <span id="playerMeta">Ready</span>
          </div>
          <button class="icon-btn" type="button" data-close-player aria-label="關閉"></button>
        </div>
        <video id="player" controls playsinline preload="metadata" poster="../assets/hero-cinema.png"></video>
      </section>
    </div>

    <script type="module">
      const tabs = [
        ['home', '主頁', false],
        ['movie', '熱門電影', true],
        ['series', '熱播劇集', false],
        ['variety', '熱播綜藝', false],
        ['movieFilter', '電影篩選', false],
        ['tvFilter', '電視篩選', false],
        ['movieRank', '電影榜單', false],
        ['tvRank', '電視榜單', false],
        ['anime', '動漫', true],
        ['live', '直播', false],
        ['sources', '來源', false],
      ];

      const demoStream = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
      const state = {
        tab: 'movie',
        query: '',
        liveKind: 'all',
        live: [],
        vod: [],
        adult: { records: [], resources: [], usable: 0, total: 0 },
        summary: {},
        clone: {},
        check: null,
        playerUrl: '',
      };

      const posterTitles = [
        ['吞噬星空', '181', '動漫', '9.1', '#572126,#b54842,#251018'],
        ['美食一場裡的女高', '03', '劇集', '8.4', '#6b4b28,#d8b272,#1b1410'],
        ['薰香花朵凜然綻放', '03', '動漫', '8.7', '#225476,#b6d8ef,#111c2c'],
        ['異人旅館', '03', '劇集', '8.0', '#432247,#e3a65b,#160b14'],
        ['瑞克與莫蒂第8季', '09', '動漫', '8.8', '#195b34,#7bd55d,#102018'],
        ['梅根2.0', '評分 6.6', '電影', '6.6', '#3a152c,#cf4fac,#120812'],
        ['新馴龍高手', '評分 8.4', '電影', '8.4', '#6e4d28,#f1c66b,#20160b'],
        ['牆外之音', '評分 6.4', '電影', '6.4', '#183a35,#41b09b,#081514'],
        ['30頁的戲曲', '評分 7.1', '電影', '7.1', '#4d3b34,#b28e71,#17110f'],
        ['河邊有個好地方', '評分 7.2', '電影', '7.2', '#477a4b,#dfb86a,#142016'],
        ['魔女與使魔', '16', '動漫', '8.2', '#4d236f,#e880d5,#190b24'],
        ['靈武大陸', '93集全', '動漫', '7.9', '#1e3c68,#4c82de,#07111f'],
      ];

      const screen = document.querySelector('#screen');
      const topNav = document.querySelector('#topNav');
      const player = document.querySelector('#player');
      const playerSheet = document.querySelector('#playerSheet');
      const playerTitle = document.querySelector('#playerTitle');
      const playerMeta = document.querySelector('#playerMeta');

      function icon(name) {
        const paths = {
          filter: '<path d="M3 5h18l-7 8v5l-4 2v-7L3 5z"></path>',
          search: '<circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path>',
          play: '<path d="m8 5 11 7-11 7V5z"></path>',
          close: '<path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>',
          refresh: '<path d="M20 12a8 8 0 1 1-2.34-5.66"></path><path d="M20 4v6h-6"></path>',
          check: '<path d="M20 6 9 17l-5-5"></path>',
          alert: '<path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path>',
        };
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[name] || paths.play}</svg>`;
      }

      async function getJson(url, fallback) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) return fallback;
          return await res.json();
        } catch {
          return fallback;
        }
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function initials(value) {
        return [...String(value || '影視').replace(/\s+/g, '')].slice(0, 2).join('');
      }

      function renderNav() {
        topNav.innerHTML = tabs
          .map(([id, label, filter]) => {
            const active = state.tab === id ? 'is-active' : '';
            return `<button class="nav-btn ${active}" type="button" data-tab="${id}">${escapeHtml(label)}${filter && state.tab === id ? icon('filter') : ''}</button>`;
          })
          .join('');
        topNav.querySelectorAll('[data-tab]').forEach((button) => {
          button.addEventListener('click', () => {
            state.tab = button.dataset.tab || 'movie';
            state.query = '';
            render();
          });
        });
      }

      function render() {
        renderNav();
        if (state.tab === 'live') return renderLive();
        if (state.tab === 'sources') return renderSources();
        return renderPosters();
      }

      function renderToolbar(placeholder = '搜尋片名、分類、來源') {
        return `
          <div class="toolbar">
            <input class="search" id="searchBox" value="${escapeHtml(state.query)}" placeholder="${escapeHtml(placeholder)}" />
            <button class="icon-btn" type="button" data-refresh aria-label="重新整理">${icon('refresh')}</button>
          </div>
        `;
      }

      function bindToolbar() {
        document.querySelector('#searchBox')?.addEventListener('input', (event) => {
          state.query = event.target.value;
          render();
          setTimeout(() => {
            const input = document.querySelector('#searchBox');
            input?.focus();
            input?.setSelectionRange(state.query.length, state.query.length);
          }, 0);
        });
        document.querySelector('[data-refresh]')?.addEventListener('click', () => location.reload());
      }

      function filteredPosters() {
        const tabLabel = tabs.find(([id]) => id === state.tab)?.[1] || '';
        const query = state.query.toLowerCase();
        return posterTitles.filter((item) => {
          const text = `${item[0]} ${item[2]} ${tabLabel}`.toLowerCase();
          if (state.tab === 'anime' && item[2] !== '動漫') return false;
          if (state.tab === 'movie' && item[2] !== '電影') return false;
          if (state.tab === 'series' && item[2] !== '劇集') return false;
          return !query || text.includes(query);
        });
      }

      function renderPosters() {
        const summary = state.summary || {};
        const adult = state.adult || {};
        const posters = filteredPosters();
        screen.innerHTML = `
          ${renderToolbar('搜尋影片、分類、來源')}
          <section class="hero-strip">
            <article class="metric"><strong>${Number(summary.vod?.count || state.vod.length || 0)}</strong><span>點播來源</span></article>
            <article class="metric"><strong>${Number(summary.live?.playableCount || state.live.filter((x) => x.playable).length || 0)}</strong><span>可播直播</span></article>
            <article class="metric"><strong>${Number(adult.usable || (adult.records || []).length || 0)}</strong><span>18+ 紀錄</span></article>
            <article class="metric"><strong>${Number(state.live.length || 0)}</strong><span>直播總數</span></article>
          </section>
          <section class="section-head">
            <div>
              <h1>${escapeHtml(tabs.find(([id]) => id === state.tab)?.[1] || '熱門電影')}</h1>
              <span>OKTV 海報牆介面</span>
            </div>
            <span class="status-pill ok">${icon('check')} 已載入</span>
          </section>
          <section class="poster-grid">
            ${posters.map(renderPoster).join('') || emptyState('沒有符合搜尋的項目')}
          </section>
        `;
        bindToolbar();
        document.querySelectorAll('[data-demo-play]').forEach((button) => {
          button.addEventListener('click', () => {
            const title = button.dataset.demoPlay || '授權示範';
            openPlayer(title, '授權示範 HLS', demoStream);
          });
        });
      }

      function renderPoster(item, index) {
        const [title, badge, type, rating, colors] = item;
        return `
          <button class="poster-card" type="button" data-demo-play="${escapeHtml(title)}">
            <div class="poster-art" style="--poster-bg: linear-gradient(135deg, ${colors});">
              <span class="score">${escapeHtml(badge)}</span>
              <strong>${escapeHtml(initials(title))}</strong>
              <span class="badge">${escapeHtml(title)}</span>
            </div>
            <strong class="poster-title">${escapeHtml(title)}</strong>
            <div class="poster-meta"><span>${escapeHtml(type)}</span><span>評分 ${escapeHtml(rating)}</span></div>
          </button>
        `;
      }

      function renderLive() {
        const kinds = ['all', 'hls', 'stream', 'external', 'network', 'unknown'];
        const query = state.query.toLowerCase();
        const rows = state.live.filter((item) => {
          const text = `${item.name} ${item.group} ${item.kind}`.toLowerCase();
          return (state.liveKind === 'all' || item.kind === state.liveKind) && (!query || text.includes(query));
        });
        screen.innerHTML = `
          ${renderToolbar('搜尋直播頻道')}
          <div class="chip-row">
            ${kinds.map((kind) => `<button class="chip ${state.liveKind === kind ? 'is-active' : ''}" type="button" data-kind="${kind}">${kindLabel(kind)}</button>`).join('')}
          </div>
          <section class="section-head">
            <div>
              <h1>直播</h1>
              <span>${rows.length} 條符合條件，${state.live.filter((item) => item.playable).length} 條可播</span>
            </div>
          </section>
          <section class="row-list">
            ${rows.map(renderLiveRow).join('') || emptyState('沒有符合搜尋的直播')}
          </section>
        `;
        bindToolbar();
        document.querySelectorAll('[data-kind]').forEach((button) => {
          button.addEventListener('click', () => {
            state.liveKind = button.dataset.kind || 'all';
            renderLive();
          });
        });
        document.querySelectorAll('[data-live-play]').forEach((button) => {
          button.addEventListener('click', () => {
            const item = state.live.find((entry) => entry.id === button.dataset.livePlay);
            if (!item) return;
            if (item.kind === 'external') {
              window.open(item.url, '_blank', 'noopener,noreferrer');
              return;
            }
            if (item.playable) openPlayer(item.name, `${item.group} · ${kindLabel(item.kind)}`, item.url);
          });
        });
      }

      function renderLiveRow(item) {
        const canPlay = item.playable || item.kind === 'external';
        return `
          <article class="list-row">
            <div class="avatar">${escapeHtml(initials(item.name))}</div>
            <div class="list-main">
              <strong>${escapeHtml(item.name)}</strong>
              <span>${escapeHtml(item.group)} · ${kindLabel(item.kind)}</span>
            </div>
            <button class="play-btn" type="button" data-live-play="${escapeHtml(item.id)}" ${canPlay ? '' : 'disabled'}>
              ${icon(item.kind === 'external' ? 'filter' : 'play')}${item.kind === 'external' ? '外部' : '播放'}
            </button>
          </article>
        `;
      }

      function renderSources() {
        const adultRecords = state.adult.records || state.adult.sites || [];
        const query = state.query.toLowerCase();
        const sourceRows = [...state.vod.map((item) => ({ ...item, sourceType: '點播' })), ...adultRecords.map((item) => ({ ...item, sourceType: '18+' }))].filter((item) =>
          `${item.name} ${item.key} ${item.endpointHost || item.api || ''} ${item.sourceType}`.toLowerCase().includes(query),
        );
        screen.innerHTML = `
          ${renderToolbar('搜尋來源名稱、API、類別')}
          <section class="status-grid">
            <article class="status-card"><strong>點播來源</strong><span>${state.vod.length} 筆，依 OKTV/FongMi CMS 格式保存。</span></article>
            <article class="status-card"><strong>18+ 保存格式</strong><span>${adultRecords.length} 筆，key/name/type/api/quickSearch/searchable/filterable。</span></article>
            <article class="status-card"><strong>點播檢測</strong><span>${Number(state.check?.vod?.ok || 0)} / ${Number(state.check?.vod?.total || 0)} 通過 API 技術檢查。</span></article>
            <article class="status-card"><strong>直播檢測</strong><span>${Number(state.check?.live?.ok || 0)} / ${Number(state.check?.live?.total || 0)} 通過 HLS 技術檢查。</span></article>
          </section>
          <p class="notice">點播來源在此頁以來源檢測與格式保存為主；未確認授權的第三方正片不設為預設播放。直播可播放項會直接開啟播放器。</p>
          <section class="row-list">
            ${sourceRows.map(renderSourceRow).join('') || emptyState('沒有符合搜尋的來源')}
          </section>
        `;
        bindToolbar();
      }

      function renderSourceRow(item) {
        const host = item.endpointHost || hostOf(item.api) || item.origin || '';
        return `
          <article class="list-row">
            <div class="avatar">${item.sourceType === '18+' ? 'AV' : 'CM'}</div>
            <div class="list-main">
              <strong>${escapeHtml(item.name)}</strong>
              <span>${escapeHtml(item.sourceType)} · ${escapeHtml(host)}</span>
            </div>
            <span class="status-pill warn">${icon('alert')} 審核</span>
          </article>
        `;
      }

      function emptyState(text) {
        return `<p class="notice">${escapeHtml(text)}</p>`;
      }

      function kindLabel(kind) {
        return {
          all: '全部',
          hls: 'M3U8',
          stream: 'HTTP',
          external: '外部',
          network: '內網',
          unknown: '未知',
        }[kind] || String(kind).toUpperCase();
      }

      function hostOf(value) {
        try {
          return new URL(String(value)).host;
        } catch {
          return '';
        }
      }

      function openPlayer(title, meta, url) {
        state.playerUrl = url;
        playerTitle.textContent = title;
        playerMeta.textContent = meta;
        player.src = url;
        playerSheet.classList.add('is-open');
        playerSheet.setAttribute('aria-hidden', 'false');
        player.play().catch(() => undefined);
      }

      function closePlayer() {
        player.pause();
        player.removeAttribute('src');
        player.load();
        state.playerUrl = '';
        playerSheet.classList.remove('is-open');
        playerSheet.setAttribute('aria-hidden', 'true');
      }

      document.querySelectorAll('[data-close-player]').forEach((item) => item.addEventListener('click', closePlayer));
      document.querySelector('[data-close-player].icon-btn').innerHTML = icon('close');

      [state.summary, state.live, state.vod, state.adult, state.clone, state.check] = await Promise.all([
        getJson('../data/source-summary.json', {}),
        getJson('../data/live-channels.json', []),
        getJson('../data/vod-sources.json', []),
        getJson('../data/adult18-sources.json', { records: [], resources: [], usable: 0, total: 0 }),
        getJson('../data/oktv-source-clone.json', {}),
        getJson('../data/oktv-playback-check-latest.json', null),
      ]);

      render();
    </script>
  </body>
</html>
