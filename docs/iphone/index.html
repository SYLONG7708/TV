<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="影視" />
    <meta name="theme-color" content="#050507" />
    <link rel="icon" href="../assets/icon.png" />
    <link rel="apple-touch-icon" href="../assets/icon.png" />
    <title>影視 OKTV iPhone</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js" defer></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050507;
        --panel: rgba(17, 18, 22, 0.92);
        --panel-2: rgba(25, 27, 33, 0.94);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f5f5f7;
        --muted: #b8bac3;
        --dim: #7f838e;
        --accent: #9f114c;
        --accent-2: #d81769;
        --cyan: #32d6e7;
        --green: #5bd58e;
        --amber: #f2bd5c;
        --red: #ff6571;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          linear-gradient(90deg, rgba(5, 5, 7, 0.97), rgba(5, 5, 7, 0.9)),
          url("../assets/hero-cinema.png") right top / auto 100vh fixed no-repeat,
          var(--bg);
        color: var(--text);
        font-family:
          "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        overflow-x: hidden;
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .app {
        width: min(100%, 1180px);
        min-height: 100vh;
        margin: 0 auto;
        padding: max(12px, env(safe-area-inset-top)) 12px max(30px, env(safe-area-inset-bottom));
      }

      .top-nav {
        position: sticky;
        top: 0;
        z-index: 30;
        min-height: 70px;
        display: flex;
        align-items: center;
        gap: 18px;
        overflow-x: auto;
        padding: 8px 0 12px;
        background: linear-gradient(180deg, rgba(5, 5, 7, 0.99), rgba(5, 5, 7, 0.74));
        backdrop-filter: blur(16px);
        scrollbar-width: none;
      }

      .top-nav::-webkit-scrollbar,
      .chip-row::-webkit-scrollbar,
      .source-rail::-webkit-scrollbar {
        display: none;
      }

      .nav-btn {
        flex: 0 0 auto;
        min-height: 46px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: rgba(255, 255, 255, 0.72);
        padding: 0 8px;
        font-size: clamp(1.05rem, 5.6vw, 1.7rem);
        font-weight: 650;
        white-space: nowrap;
        cursor: pointer;
      }

      .nav-btn.is-active {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        padding: 0 22px;
        font-weight: 900;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }

      .search {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        padding: 0 12px;
        outline: none;
      }

      .search:focus {
        border-color: rgba(216, 23, 105, 0.82);
      }

      .icon-btn,
      .text-icon-btn,
      .play-btn {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
      }

      .icon-btn {
        width: 42px;
      }

      .text-icon-btn,
      .play-btn {
        padding: 0 12px;
        white-space: nowrap;
      }

      .icon-btn svg,
      .text-icon-btn svg,
      .play-btn svg,
      .status-pill svg {
        width: 18px;
        height: 18px;
      }

      .hero {
        min-height: 46vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(118px, 32%);
        gap: 14px;
        align-items: end;
        margin-bottom: 14px;
      }

      .hero-copy {
        min-width: 0;
        padding-bottom: 6px;
      }

      .hero-kicker {
        color: var(--cyan);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .hero h1 {
        margin: 8px 0 8px;
        font-size: clamp(2.2rem, 13vw, 4.5rem);
        line-height: 0.95;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .hero-meta,
      .item-meta,
      .section-head span,
      .source-row span,
      .episode-grid span {
        color: var(--muted);
      }

      .hero-poster {
        min-width: 0;
      }

      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        margin: 14px 0 10px;
      }

      .section-head h1,
      .section-head h2 {
        margin: 0;
        font-size: clamp(1.18rem, 5.8vw, 1.72rem);
      }

      .poster-grid,
      .rank-list,
      .source-list,
      .live-list {
        display: grid;
        gap: 12px;
      }

      .poster-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .poster-card {
        min-width: 0;
        border: 0;
        background: transparent;
        color: inherit;
        padding: 0;
        text-align: left;
        cursor: pointer;
      }

      .poster-art {
        position: relative;
        aspect-ratio: 0.72;
        overflow: hidden;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background:
          linear-gradient(135deg, #153746, #60183c 52%, #120911);
      }

      .poster-art img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .poster-art img.is-broken {
        display: none;
      }

      .poster-fallback {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 14px;
        text-align: center;
        font-size: 0;
        font-weight: 900;
        line-height: 1.08;
        overflow-wrap: anywhere;
        color: transparent;
      }

      .poster-fallback::after {
        content: "";
        width: 42%;
        aspect-ratio: 1;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.05);
      }

      .poster-art img:not(.is-broken) + .poster-fallback {
        display: none;
      }

      .badge,
      .score {
        position: absolute;
        z-index: 2;
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        border-radius: 6px;
        background: rgba(20, 20, 24, 0.78);
        color: #fff;
        padding: 0 8px;
        font-size: 0.82rem;
        max-width: calc(100% - 16px);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .score {
        top: 8px;
        left: 8px;
      }

      .badge {
        left: 8px;
        bottom: 8px;
      }

      .poster-title {
        display: block;
        margin-top: 8px;
        color: #fff;
        font-size: 1rem;
        line-height: 1.25;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .poster-sub {
        display: flex;
        gap: 7px;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.78rem;
        overflow: hidden;
        white-space: nowrap;
      }

      .chip-row,
      .source-rail,
      .area-rail {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        margin-bottom: 12px;
        scrollbar-width: none;
      }

      .chip {
        flex: 0 0 auto;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
        padding: 0 12px;
        cursor: pointer;
      }

      .chip.is-active {
        border-color: rgba(216, 23, 105, 0.76);
        background: rgba(216, 23, 105, 0.24);
        color: #fff;
      }

      .source-pill {
        flex: 0 0 auto;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: inherit;
        padding: 0 12px;
        cursor: pointer;
      }

      .source-pill.is-active {
        border-color: rgba(50, 214, 231, 0.6);
        background: rgba(50, 214, 231, 0.16);
      }

      .source-toggle {
        width: 100%;
        min-height: 46px;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid rgba(50, 214, 231, 0.44);
        border-radius: 8px;
        background: rgba(8, 12, 16, 0.96);
        color: #fff;
        padding: 0 12px;
        margin-bottom: 12px;
        cursor: pointer;
      }

      .source-toggle strong,
      .source-toggle span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .source-toggle span {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .floating-filter {
        position: fixed;
        right: max(14px, env(safe-area-inset-right));
        bottom: max(18px, env(safe-area-inset-bottom));
        z-index: 55;
        min-width: 54px;
        min-height: 54px;
        border: 1px solid rgba(216, 23, 105, 0.62);
        border-radius: 999px;
        background: linear-gradient(135deg, #9f114c, #d81769);
        color: #fff;
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.36);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .floating-filter svg {
        width: 22px;
        height: 22px;
      }

      .row,
      .source-row {
        min-height: 68px;
        display: grid;
        grid-template-columns: 46px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px;
      }

      .avatar {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: rgba(216, 23, 105, 0.25);
        color: #fff;
        font-weight: 900;
      }

      .row-main {
        min-width: 0;
      }

      .row-main strong,
      .row-main span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .row-main span {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .status-pill {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 0 10px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 0.78rem;
        white-space: nowrap;
      }

      .status-pill.ok {
        background: rgba(91, 213, 142, 0.18);
        color: var(--green);
      }

      .status-pill.warn {
        background: rgba(242, 189, 92, 0.18);
        color: var(--amber);
      }

      .filter-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .notice {
        border: 1px solid rgba(242, 189, 92, 0.34);
        border-radius: 8px;
        background: rgba(242, 189, 92, 0.1);
        color: #ffdc9a;
        padding: 10px 12px;
        font-size: 0.88rem;
        line-height: 1.5;
      }

      .sheet {
        position: fixed;
        inset: 0;
        z-index: 80;
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .sheet.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .sheet-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.68);
        backdrop-filter: blur(8px);
      }

      .sheet-panel {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: min(100%, 740px);
        max-height: 86vh;
        display: flex;
        flex-direction: column;
        transform: translateX(-50%);
        border: 1px solid var(--line);
        border-bottom: 0;
        border-radius: 8px 8px 0 0;
        background: #07070a;
        padding: 12px 12px max(14px, env(safe-area-inset-bottom));
      }

      .sheet-head {
        min-height: 50px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .sheet-head strong,
      .sheet-head span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sheet-head span {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .sheet-body {
        min-height: 0;
        overflow: auto;
        padding-top: 8px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: 116px minmax(0, 1fr);
        gap: 12px;
        margin-bottom: 12px;
      }

      .detail-grid .poster-art {
        min-width: 0;
      }

      .detail-copy {
        min-width: 0;
      }

      .detail-copy h2 {
        margin: 0 0 8px;
        font-size: 1.35rem;
        line-height: 1.18;
      }

      .detail-copy p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 0.88rem;
      }

      .episode-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .episode-grid button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        cursor: pointer;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        background: #000;
      }

      .hidden {
        display: none !important;
      }

      @media (min-width: 620px) {
        .poster-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (min-width: 980px) {
        .poster-grid {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        .app {
          padding-inline: 28px;
        }
      }

      @media (max-width: 430px) {
        .top-nav {
          gap: 12px;
        }

        .hero {
          min-height: 36vh;
          grid-template-columns: minmax(0, 1fr) 124px;
        }

        .poster-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .toolbar {
          grid-template-columns: minmax(0, 1fr) 42px 42px;
        }

        .text-icon-btn span {
          display: none;
        }

        .episode-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <nav class="top-nav" aria-label="OKTV 分頁" id="topNav"></nav>
      <main id="screen"></main>
    </div>

    <div class="sheet" id="sourceSheet" aria-hidden="true">
      <div class="sheet-backdrop" data-close-sheet></div>
      <section class="sheet-panel">
        <div class="sheet-head">
          <div><strong>點播訊號源</strong><span id="sourceSheetMeta">可切換已建立索引的來源</span></div>
          <button class="icon-btn" type="button" data-close-sheet aria-label="關閉"></button>
        </div>
        <div class="sheet-body" id="sourceSheetBody"></div>
      </section>
    </div>

    <div class="sheet" id="filterSheet" aria-hidden="true">
      <div class="sheet-backdrop" data-close-filter></div>
      <section class="sheet-panel">
        <div class="sheet-head">
          <div><strong>篩選器</strong><span>年份、地區、類型、觀看人數、評分</span></div>
          <button class="icon-btn" type="button" data-close-filter aria-label="關閉"></button>
        </div>
        <div class="sheet-body" id="filterSheetBody"></div>
      </section>
    </div>

    <div class="sheet" id="detailSheet" aria-hidden="true">
      <div class="sheet-backdrop" data-close-detail></div>
      <section class="sheet-panel">
        <div class="sheet-head">
          <div><strong id="detailTitle">影視</strong><span id="detailMeta">OKTV</span></div>
          <button class="icon-btn" type="button" data-close-detail aria-label="關閉"></button>
        </div>
        <div class="sheet-body" id="detailBody"></div>
      </section>
    </div>

    <div class="sheet" id="playerSheet" aria-hidden="true">
      <div class="sheet-backdrop" data-close-player></div>
      <section class="sheet-panel">
        <div class="sheet-head">
          <div><strong id="playerTitle">影視</strong><span id="playerMeta">Ready</span></div>
          <button class="icon-btn" type="button" data-close-player aria-label="關閉"></button>
        </div>
        <video id="player" controls playsinline preload="metadata" poster="../assets/hero-cinema.png"></video>
      </section>
    </div>

    <script type="module">
      const tabs = [
        ['home', '主頁'],
        ['movie', '電影'],
        ['short', '短劇'],
        ['variety', '綜藝'],
        ['anime', '動漫'],
        ['rank', '榜單'],
        ['live', '直播'],
      ];

      const state = {
        tab: 'home',
        query: '',
        selectedSource: localStorage.getItem('oktv:iphone:selectedSource') || 'all',
        filters: {
          year: 'all',
          area: 'all',
          genre: 'all',
          sort: 'hot',
        },
        catalog: { totals: {}, sources: [], items: [], filters: { years: [], areas: [], genres: [] } },
        live: [],
        health: { failed: [] },
        healthIndex: { sources: new Set(), posters: new Set(), live: new Set() },
        activeItem: null,
        playerUrl: '',
      };

      const topNav = document.querySelector('#topNav');
      const screen = document.querySelector('#screen');
      const sourceSheet = document.querySelector('#sourceSheet');
      const sourceSheetBody = document.querySelector('#sourceSheetBody');
      const filterSheet = document.querySelector('#filterSheet');
      const filterSheetBody = document.querySelector('#filterSheetBody');
      const detailSheet = document.querySelector('#detailSheet');
      const detailBody = document.querySelector('#detailBody');
      const detailTitle = document.querySelector('#detailTitle');
      const detailMeta = document.querySelector('#detailMeta');
      const playerSheet = document.querySelector('#playerSheet');
      const player = document.querySelector('#player');
      const playerTitle = document.querySelector('#playerTitle');
      const playerMeta = document.querySelector('#playerMeta');
      let hls = null;

      function icon(name) {
        const paths = {
          filter: '<path d="M3 5h18l-7 8v5l-4 2v-7L3 5z"></path>',
          signal: '<path d="M2 20h.01"></path><path d="M7 20a5 5 0 0 0-5-5"></path><path d="M12 20A10 10 0 0 0 2 10"></path><path d="M17 20A15 15 0 0 0 2 5"></path>',
          search: '<circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path>',
          play: '<path d="m8 5 11 7-11 7V5z"></path>',
          chevron: '<path d="m6 9 6 6 6-6"></path>',
          close: '<path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>',
          check: '<path d="M20 6 9 17l-5-5"></path>',
          alert: '<path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path>',
        };
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[name] || paths.play}</svg>`;
      }

      async function getJson(url, fallback) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) return fallback;
          return await res.json();
        } catch {
          return fallback;
        }
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function initials(value) {
        return [...String(value || '影視').replace(/\s+/g, '')].slice(0, 2).join('');
      }

      function imageSrc(value) {
        const raw = String(value || '').trim();
        if (!raw) return '';
        return raw.replace(/^http:/i, 'https:');
      }

      function activeSource() {
        if (state.selectedSource === 'all') return null;
        return state.catalog.sources.find((source) => source.id === state.selectedSource) || null;
      }

      function sourceLabel() {
        return activeSource()?.name || '全部來源';
      }

      function sourceItems(sourceId = state.selectedSource) {
        const query = state.query.trim().toLowerCase();
        return state.catalog.items.filter((item) => {
          if (state.healthIndex.posters.has(item.id)) return false;
          if (state.healthIndex.sources.has(item.sourceId)) return false;
          if (sourceId !== 'all' && item.sourceId !== sourceId) return false;
          if (state.tab !== 'home' && state.tab !== 'rank' && item.kind !== state.tab) return false;
          if (state.filters.year !== 'all' && item.year !== state.filters.year) return false;
          if (state.filters.area !== 'all' && item.area !== state.filters.area) return false;
          if (state.filters.genre !== 'all' && !item.genre.includes(state.filters.genre)) return false;
          if (!query) return true;
          return `${item.title} ${item.categoryName} ${item.year} ${item.area} ${item.genre.join(' ')} ${item.sourceName}`
            .toLowerCase()
            .includes(query);
        });
      }

      function sortedItems(items) {
        const rows = [...items];
        if (state.filters.sort === 'latest') {
          return rows.sort((a, b) => Date.parse(b.updatedAt || 0) - Date.parse(a.updatedAt || 0));
        }
        if (state.filters.sort === 'score') return rows.sort((a, b) => Number(b.score || 0) - Number(a.score || 0));
        if (state.filters.sort === 'views') return rows.sort((a, b) => Number(b.views || 0) - Number(a.views || 0));
        if (state.filters.sort === 'name') return rows.sort((a, b) => a.title.localeCompare(b.title, 'zh-Hant'));
        return rows.sort((a, b) => Number(b.hot || 0) - Number(a.hot || 0));
      }

      function renderNav() {
        topNav.innerHTML = tabs
          .map(([id, label]) => `<button class="nav-btn ${state.tab === id ? 'is-active' : ''}" type="button" data-tab="${id}">${escapeHtml(label)}</button>`)
          .join('');
        topNav.querySelectorAll('[data-tab]').forEach((button) => {
          button.addEventListener('click', () => {
            state.tab = button.dataset.tab || 'home';
            state.query = '';
            render();
          });
        });
      }

      function render() {
        renderNav();
        if (state.tab === 'live') return renderLive();
        if (state.tab === 'rank') return renderRank();
        return renderVodScreen();
      }

      function renderToolbar(placeholder = '搜尋片名、類型、年份') {
        return `
          <div class="toolbar">
            <input class="search" id="searchBox" value="${escapeHtml(state.query)}" placeholder="${escapeHtml(placeholder)}" />
            <button class="icon-btn" type="button" data-open-source aria-label="點播訊號源">${icon('signal')}</button>
            <button class="icon-btn" type="button" data-open-filter aria-label="篩選器">${icon('filter')}</button>
          </div>
        `;
      }

      function bindToolbar() {
        document.querySelector('#searchBox')?.addEventListener('input', (event) => {
          state.query = event.target.value;
          render();
          setTimeout(() => {
            const input = document.querySelector('#searchBox');
            input?.focus();
            input?.setSelectionRange(state.query.length, state.query.length);
          }, 0);
        });
        document.querySelector('[data-open-source]')?.addEventListener('click', openSourceSheet);
        document.querySelector('[data-open-filter]')?.addEventListener('click', openFilterSheet);
      }

      function renderFilterSummary() {
        const chips = [
          ['訊號源', sourceLabel()],
          ['年份', state.filters.year === 'all' ? '全部' : state.filters.year],
          ['國家', state.filters.area === 'all' ? '全部' : state.filters.area],
          ['類型', state.filters.genre === 'all' ? '全部' : state.filters.genre],
          ['排序', sortLabel(state.filters.sort)],
        ];
        return `<div class="filter-summary">${chips.map(([k, v]) => `<span class="status-pill">${escapeHtml(k)} ${escapeHtml(v)}</span>`).join('')}</div>`;
      }

      function renderVodScreen() {
        const rows = sortedItems(sourceItems()).slice(0, state.tab === 'home' ? 36 : 120);
        const title = tabs.find(([id]) => id === state.tab)?.[1] || '主頁';
        const controls = `${renderSourceRail()}${state.tab === 'short' ? renderShortAreaRail() : ''}`;
        screen.innerHTML = `
          ${renderToolbar()}
          ${controls}
          <section class="section-head">
            <div><h1>${escapeHtml(title)}</h1><span>${rows.length} 部內容，${state.catalog.totals.playableItems || 0} 部有播放項</span></div>
            <span class="status-pill ok">${icon('check')} OKTV</span>
          </section>
          <section class="poster-grid">
            ${rows.map(renderPoster).join('') || emptyState('目前沒有符合篩選的影片')}
          </section>
          ${renderFloatingFilter()}
        `;
        bindToolbar();
        bindPosters();
        bindSourceRail();
        bindShortAreaRail();
        bindFloatingFilter();
      }

      function renderHero(item) {
        return `
          <section class="hero">
            <div class="hero-copy">
              <span class="hero-kicker">${escapeHtml(item.sourceName || 'OKTV')}</span>
              <h1>${escapeHtml(item.title)}</h1>
              <div class="hero-meta">${escapeHtml([item.year, item.area, item.categoryName].filter(Boolean).join(' / '))}</div>
              <div style="margin-top:14px">
                <button class="play-btn" type="button" data-open-detail="${escapeHtml(item.id)}">${icon('play')}播放</button>
              </div>
            </div>
            <div class="hero-poster">${renderPosterArt(item)}</div>
          </section>
        `;
      }

      function renderSourceRail() {
        const selected = activeSource();
        const indexedCount = state.catalog.sources.filter((source) => source.indexed && !state.healthIndex.sources.has(source.id)).length;
        return `
          <div class="source-rail">
            <button class="source-toggle" type="button" data-open-source>
              ${icon('signal')}
              <span><strong>${escapeHtml(sourceLabel())}</strong><span>${selected ? `${selected.itemCount || 0} 部 / ${selected.playableCount || 0} 可播放` : `${indexedCount} 個來源 / ${state.catalog.totals.playableItems || 0} 部可播放`}</span></span>
              ${icon('chevron')}
            </button>
          </div>
        `;
      }

      function bindSourceRail() {
        document.querySelectorAll('[data-open-source]').forEach((button) => button.addEventListener('click', openSourceSheet));
      }

      function shortAreas() {
        const areas = [...new Set(state.catalog.items.filter((item) => item.kind === 'short').map((item) => item.area).filter(Boolean))];
        return areas.sort((a, b) => {
          const score = (value) => (value.includes('韓國') ? -2 : value.includes('韓') ? -1 : 0);
          return score(a) - score(b) || a.localeCompare(b, 'zh-Hant');
        });
      }

      function renderShortAreaRail() {
        const areas = shortAreas();
        if (!areas.length) return '';
        return `
          <div class="area-rail">
            <button class="chip ${state.filters.area === 'all' ? 'is-active' : ''}" type="button" data-short-area="all">全部地區</button>
            ${areas
              .map((area) => `<button class="chip ${state.filters.area === area ? 'is-active' : ''}" type="button" data-short-area="${escapeHtml(area)}">${escapeHtml(area)}</button>`)
              .join('')}
          </div>
        `;
      }

      function bindShortAreaRail() {
        document.querySelectorAll('[data-short-area]').forEach((button) => {
          button.addEventListener('click', () => {
            state.filters.area = button.dataset.shortArea || 'all';
            render();
          });
        });
      }

      function renderFloatingFilter() {
        return `<button class="floating-filter" type="button" data-open-filter aria-label="篩選器">${icon('filter')}</button>`;
      }

      function bindFloatingFilter() {
        document.querySelectorAll('[data-open-filter]').forEach((button) => button.addEventListener('click', openFilterSheet));
      }

      function renderRank() {
        const rows = sortedItems(sourceItems()).slice(0, 80);
        screen.innerHTML = `
          ${renderToolbar('搜尋榜單內容')}
          ${renderSourceRail()}
          <section class="section-head">
            <div><h1>榜單</h1><span>觀看人數與評分排序</span></div>
          </section>
          <section class="rank-list">
            ${rows.map(renderRankRow).join('') || emptyState('目前沒有榜單內容')}
          </section>
          ${renderFloatingFilter()}
        `;
        bindToolbar();
        bindSourceRail();
        bindFloatingFilter();
        document.querySelectorAll('[data-open-detail]').forEach((button) => {
          button.addEventListener('click', () => openDetail(button.dataset.openDetail));
        });
      }

      function renderLive() {
        const query = state.query.trim().toLowerCase();
        const rows = state.live
          .filter((item) => !state.healthIndex.live.has(item.id))
          .filter((item) => !query || `${item.name} ${item.group} ${item.kind}`.toLowerCase().includes(query));
        screen.innerHTML = `
          <div class="toolbar">
            <input class="search" id="searchBox" value="${escapeHtml(state.query)}" placeholder="搜尋直播頻道" />
            <button class="icon-btn" type="button" data-open-source aria-label="點播訊號源">${icon('signal')}</button>
            <button class="icon-btn" type="button" data-open-filter aria-label="篩選器">${icon('filter')}</button>
          </div>
          <section class="section-head">
            <div><h1>直播</h1><span>${rows.length} 條頻道，${state.live.filter((item) => item.playable && !state.healthIndex.live.has(item.id)).length} 條可播放</span></div>
          </section>
          <section class="live-list">
            ${rows.map(renderLiveRow).join('') || emptyState('目前沒有符合搜尋的直播')}
          </section>
          ${renderFloatingFilter()}
        `;
        bindToolbar();
        bindFloatingFilter();
        document.querySelectorAll('[data-live-play]').forEach((button) => {
          button.addEventListener('click', () => {
            const item = state.live.find((entry) => entry.id === button.dataset.livePlay);
            if (!item) return;
            if (item.kind === 'external') return window.open(item.url, '_blank', 'noopener,noreferrer');
            if (item.playable) openPlayer(item.name, `${item.group} / ${kindLabel(item.kind)}`, item.url);
          });
        });
      }

      function renderSources() {
        const rows = state.catalog.sources.filter((source) => !state.healthIndex.sources.has(source.id));
        screen.innerHTML = `
          ${renderToolbar('搜尋點播源')}
          <section class="section-head">
            <div><h1>點播源</h1><span>${state.catalog.totals.indexedSources || 0} 個來源已建立手機索引</span></div>
          </section>
          <section class="source-list">
            ${rows.map(renderSourceRow).join('') || emptyState('沒有點播源資料')}
          </section>
        `;
        bindToolbar();
        document.querySelectorAll('[data-select-source]').forEach((button) => {
          button.addEventListener('click', () => selectSource(button.dataset.selectSource || 'all'));
        });
      }

      function renderPoster(item) {
        return `
          <button class="poster-card" type="button" data-open-detail="${escapeHtml(item.id)}">
            ${renderPosterArt(item)}
            <strong class="poster-title">${escapeHtml(item.title)}</strong>
            <div class="poster-sub"><span>${escapeHtml(item.year || item.categoryName || item.kind)}</span><span>${escapeHtml(item.area || item.sourceName)}</span></div>
          </button>
        `;
      }

      function renderPosterArt(item) {
        const poster = imageSrc(item.poster);
        return `
          <div class="poster-art">
            ${poster ? `<img src="${escapeHtml(poster)}" alt="${escapeHtml(item.title)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.classList.add('is-broken')" />` : ''}
            <div class="poster-fallback">${escapeHtml(initials(item.title))}</div>
            <span class="score">${escapeHtml(item.score ? `評分 ${item.score}` : item.remarks || item.year || 'OKTV')}</span>
            <span class="badge">${escapeHtml(item.remarks || item.categoryName || item.kind)}</span>
          </div>
        `;
      }

      function renderRankRow(item, index) {
        return `
          <article class="row">
            <div class="avatar">${index + 1}</div>
            <div class="row-main">
              <strong>${escapeHtml(item.title)}</strong>
              <span>${escapeHtml([item.sourceName, item.year, item.area, item.categoryName].filter(Boolean).join(' / '))}</span>
            </div>
            <button class="play-btn" type="button" data-open-detail="${escapeHtml(item.id)}">${icon('play')}播放</button>
          </article>
        `;
      }

      function renderLiveRow(item) {
        const playable = item.playable || item.kind === 'external';
        return `
          <article class="row">
            <div class="avatar">${escapeHtml(initials(item.name))}</div>
            <div class="row-main">
              <strong>${escapeHtml(item.name)}</strong>
              <span>${escapeHtml(item.group)} / ${kindLabel(item.kind)}</span>
            </div>
            <button class="play-btn" type="button" data-live-play="${escapeHtml(item.id)}" ${playable ? '' : 'disabled'}>${icon(item.kind === 'external' ? 'signal' : 'play')}${item.kind === 'external' ? '外部' : '播放'}</button>
          </article>
        `;
      }

      function renderSourceRow(source) {
        const active = state.selectedSource === source.id;
        const canSelect = source.indexed;
        return `
          <article class="source-row">
            <div class="avatar">${source.type === 3 ? 'SP' : source.adult ? 'AV' : 'VOD'}</div>
            <div class="row-main">
              <strong>${escapeHtml(source.name)}</strong>
              <span>${escapeHtml(source.origin)} / ${escapeHtml(source.host || source.key)} / ${source.itemCount || 0} 部</span>
            </div>
            ${
              canSelect
                ? `<button class="play-btn" type="button" data-select-source="${escapeHtml(source.id)}">${icon(active ? 'check' : 'signal')}${active ? '使用中' : '切換'}</button>`
                : `<span class="status-pill warn">${source.adult ? '18+' : source.type === 3 ? 'Spider' : '未索引'}</span>`
            }
          </article>
        `;
      }

      function bindPosters() {
        document.querySelectorAll('[data-open-detail]').forEach((button) => {
          button.addEventListener('click', () => openDetail(button.dataset.openDetail));
        });
      }

      function openDetail(id) {
        const item = state.catalog.items.find((entry) => entry.id === id);
        if (!item) return;
        state.activeItem = item;
        detailTitle.textContent = item.title;
        detailMeta.textContent = [item.sourceName, item.year, item.area, item.categoryName].filter(Boolean).join(' / ');
        detailBody.innerHTML = `
          <div class="detail-grid">
            ${renderPosterArt(item)}
            <div class="detail-copy">
              <h2>${escapeHtml(item.title)}</h2>
              <div class="item-meta">${escapeHtml([item.remarks, item.score ? `評分 ${item.score}` : '', item.updatedAt].filter(Boolean).join(' / '))}</div>
              <p>${escapeHtml(item.content || item.actor || item.director || '此內容已建立 OKTV 手機索引。')}</p>
            </div>
          </div>
          <section class="section-head"><h2>播放</h2><span>${item.episodes.length} 集</span></section>
          <div class="episode-grid">
            ${
              item.episodes.length
                ? item.episodes
                    .map((episode, index) => `<button type="button" data-episode="${index}">${escapeHtml(episode.name || `第 ${index + 1} 集`)}</button>`)
                    .join('')
                : '<span>目前沒有可播放集數</span>'
            }
          </div>
        `;
        detailBody.querySelectorAll('[data-episode]').forEach((button) => {
          button.addEventListener('click', () => {
            const episode = item.episodes[Number(button.dataset.episode || 0)];
            if (episode) openPlayer(item.title, episode.name, episode.url);
          });
        });
        openSheet(detailSheet);
      }

      function openPlayer(title, meta, url) {
        closeDetail(false);
        hls?.destroy?.();
        hls = null;
        player.pause();
        player.removeAttribute('src');
        player.load();
        playerTitle.textContent = title;
        playerMeta.textContent = meta;
        state.playerUrl = url;
        openSheet(playerSheet);

        if (/\.m3u8(?:$|\?)/i.test(url) && window.Hls?.isSupported?.()) {
          hls = new window.Hls({ lowLatencyMode: true, enableWorker: true });
          hls.loadSource(url);
          hls.attachMedia(player);
        } else {
          player.src = url;
        }
        player.play().catch(() => undefined);
      }

      function closePlayer() {
        hls?.destroy?.();
        hls = null;
        player.pause();
        player.removeAttribute('src');
        player.load();
        state.playerUrl = '';
        closeSheet(playerSheet);
      }

      function openSourceSheet() {
        sourceSheetBody.innerHTML = `
          <section class="source-list">
            <article class="source-row">
              <div class="avatar">ALL</div>
              <div class="row-main"><strong>全部來源</strong><span>${state.catalog.items.length} 部手機索引內容</span></div>
              <button class="play-btn" type="button" data-sheet-source="all">${icon(state.selectedSource === 'all' ? 'check' : 'signal')}${state.selectedSource === 'all' ? '使用中' : '切換'}</button>
            </article>
            ${state.catalog.sources.filter((source) => !state.healthIndex.sources.has(source.id)).map((source) => renderSheetSourceRow(source)).join('')}
          </section>
        `;
        sourceSheetBody.querySelectorAll('[data-sheet-source]').forEach((button) => {
          button.addEventListener('click', () => {
            selectSource(button.dataset.sheetSource || 'all');
            closeSheet(sourceSheet);
          });
        });
        openSheet(sourceSheet);
      }

      function renderSheetSourceRow(source) {
        const active = state.selectedSource === source.id;
        const canSelect = source.indexed;
        return `
          <article class="source-row">
            <div class="avatar">${source.type === 3 ? 'SP' : source.adult ? 'AV' : 'VOD'}</div>
            <div class="row-main">
              <strong>${escapeHtml(source.name)}</strong>
              <span>${escapeHtml(source.origin)} / ${source.itemCount || 0} 部 / ${source.playableCount || 0} 可播放</span>
            </div>
            ${
              canSelect
                ? `<button class="play-btn" type="button" data-sheet-source="${escapeHtml(source.id)}">${icon(active ? 'check' : 'signal')}${active ? '使用中' : '切換'}</button>`
                : `<span class="status-pill warn">${source.adult ? '18+' : source.type === 3 ? 'Spider' : '未索引'}</span>`
            }
          </article>
        `;
      }

      function openFilterSheet() {
        const filter = (label, key, values) => `
          <section class="section-head"><h2>${label}</h2></section>
          <div class="chip-row">
            ${values
              .map(
                ([value, text]) =>
                  `<button class="chip ${state.filters[key] === value ? 'is-active' : ''}" type="button" data-filter-key="${key}" data-filter-value="${escapeHtml(value)}">${escapeHtml(text)}</button>`,
              )
              .join('')}
          </div>
        `;
        const years = [['all', '全部年份'], ...state.catalog.filters.years.map((year) => [year, year])];
        const areas = [['all', '全部地區'], ...state.catalog.filters.areas.map((area) => [area, area])];
        const genres = [['all', '全部類型'], ...state.catalog.filters.genres.map((genre) => [genre, genre])];
        const sorts = [
          ['hot', '熱門'],
          ['views', '觀看人數'],
          ['latest', '發布時間'],
          ['score', '評分'],
          ['name', '名稱'],
        ];
        filterSheetBody.innerHTML = `
          ${filter('年份', 'year', years)}
          ${filter('地區', 'area', areas)}
          ${filter('類型', 'genre', genres)}
          ${filter('排序', 'sort', sorts)}
          <button class="play-btn" type="button" data-reset-filter style="width:100%;margin-top:10px">重設篩選</button>
        `;
        filterSheetBody.querySelectorAll('[data-filter-key]').forEach((button) => {
          button.addEventListener('click', () => {
            state.filters[button.dataset.filterKey] = button.dataset.filterValue || 'all';
            openFilterSheet();
            render();
          });
        });
        filterSheetBody.querySelector('[data-reset-filter]')?.addEventListener('click', () => {
          state.filters = { year: 'all', area: 'all', genre: 'all', sort: 'hot' };
          closeSheet(filterSheet);
          render();
        });
        openSheet(filterSheet);
      }

      function selectSource(sourceId) {
        state.selectedSource = sourceId;
        localStorage.setItem('oktv:iphone:selectedSource', sourceId);
        state.tab = state.tab === 'sources' ? 'movie' : state.tab;
        render();
      }

      function sortLabel(value) {
        return { hot: '熱門', views: '觀看人數', latest: '發布時間', score: '評分', name: '名稱' }[value] || value;
      }

      function kindLabel(kind) {
        return { hls: 'M3U8', stream: 'HTTP', external: '外部', network: '內網', unknown: '未知' }[kind] || kind;
      }

      function emptyState(text) {
        return `<p class="notice">${escapeHtml(text)}</p>`;
      }

      function openSheet(sheet) {
        sheet.classList.add('is-open');
        sheet.setAttribute('aria-hidden', 'false');
      }

      function closeSheet(sheet) {
        sheet.classList.remove('is-open');
        sheet.setAttribute('aria-hidden', 'true');
      }

      function closeDetail(close = true) {
        if (close) closeSheet(detailSheet);
      }

      document.querySelectorAll('[data-close-sheet]').forEach((item) => item.addEventListener('click', () => closeSheet(sourceSheet)));
      document.querySelectorAll('[data-close-filter]').forEach((item) => item.addEventListener('click', () => closeSheet(filterSheet)));
      document.querySelectorAll('[data-close-detail]').forEach((item) => item.addEventListener('click', () => closeDetail(true)));
      document.querySelectorAll('[data-close-player]').forEach((item) => item.addEventListener('click', closePlayer));
      document.querySelector('#sourceSheet [data-close-sheet].icon-btn').innerHTML = icon('close');
      document.querySelector('#filterSheet [data-close-filter].icon-btn').innerHTML = icon('close');
      document.querySelector('#detailSheet [data-close-detail].icon-btn').innerHTML = icon('close');
      document.querySelector('#playerSheet [data-close-player].icon-btn').innerHTML = icon('close');

      [state.catalog, state.live, state.health] = await Promise.all([
        getJson('../data/iphone-vod-catalog.json', state.catalog),
        getJson('../data/live-channels.json', []),
        getJson('../data/iphone-health-check-latest.json', { failed: [] }),
      ]);
      state.healthIndex = {
        sources: new Set((state.health.failed || []).filter((row) => row.kind === 'source').map((row) => row.id)),
        posters: new Set((state.health.failed || []).filter((row) => row.kind === 'poster').map((row) => row.id)),
        live: new Set((state.health.failed || []).filter((row) => row.kind === 'live').map((row) => row.id)),
      };
      if (
        state.selectedSource !== 'all' &&
        !state.catalog.sources.some((source) => source.id === state.selectedSource && source.indexed && !state.healthIndex.sources.has(source.id))
      ) {
        state.selectedSource = 'all';
      }
      render();
    </script>
  </body>
</html>
