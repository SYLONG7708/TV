name: Update LunaTV VOD sources

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tools/update-lunatv-vod.ps1"
      - "tools/update-lunatv-vod-local.ps1"
      - "tools/install-lunatv-vod-autoupdate-task.ps1"
      - "tools/build-all-on-demand-sources.mjs"
      - "tools/build-iphone-vod-catalog.mjs"
      - "tools/check-iphone-catalog-health.mjs"
      - "docs/iphone/index.html"
      - "docs/assets/source-signal-icon.svg"
      - "docs/assets/adult-18-badge.svg"
      - "sources/current-sources.json"
      - "sources/All on-demand sources"
      - ".github/workflows/update-lunatv-vod.yml"
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: update-lunatv-vod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh LunaTV VOD sources
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\update-lunatv-vod.ps1 `
            -SourceName "jin18" `
            -TimeoutSec 12 `
            -MaxDetailProbe 2 `
            -RedactSampleNames
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\update-lunatv-vod.ps1 `
            -SourceName "full" `
            -TimeoutSec 12 `
            -MaxDetailProbe 2 `
            -RedactSampleNames
          node .\tools\build-all-on-demand-sources.mjs `
            --repoRoot . `
            --timeoutMs 12000 `
            --concurrency 10
          node .\tools\build-lunatv-adult18-sorted.mjs --repoRoot .
          node .\tools\build-iphone-vod-catalog.mjs `
            --tvRoot . `
            --output .\docs\data\iphone-vod-catalog.json `
            --reportOutput .\docs\data\iphone-vod-catalog-report.json `
            --maxSources 90 `
            --maxItemsPerSource 70 `
            --maxCategoriesPerSource 8 `
            --includeAdult true `
            --timeoutMs 8000
          node .\tools\check-iphone-catalog-health.mjs `
            --tvRoot . `
            --catalog .\docs\data\iphone-vod-catalog.json `
            --live .\docs\data\live-channels.json `
            --output .\docs\data\iphone-health-check-latest.json `
            --csvOutput .\docs\data\iphone-health-check-latest.csv `
            --timeoutMs 8000 `
            --concurrency 18

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/current-sources.json `
            "sources/All on-demand sources" "sources/All on-demand sources-report.json" `
            sources/vod-lunatv-jin18-oktv.json sources/vod-lunatv-jin18-report.json sources/vod-lunatv-jin18-analysis.csv `
            sources/vod-lunatv-full-oktv.json sources/vod-lunatv-full-report.json sources/vod-lunatv-full-analysis.csv `
            sources/vod-lunatv-adult18-sorted-oktv.json sources/vod-lunatv-adult18-sorted-report.json sources/vod-lunatv-adult18-sorted-analysis.csv `
            docs/data/vod-sources.json docs/data/iphone-vod-catalog.json docs/data/iphone-vod-catalog-report.json `
            docs/data/iphone-health-check-latest.json docs/data/iphone-health-check-latest.csv `
            docs/iphone/index.html `
            docs/assets/source-signal-icon.svg docs/assets/adult-18-badge.svg
          if (git diff --cached --quiet) {
            Write-Host "No LunaTV VOD source changes."
          } else {
            git commit -m "Auto refresh LunaTV VOD sources"
            git push
          }

      - name: Publish GitHub Pages data
        shell: pwsh
        run: |
          git fetch origin gh-pages
          $pages = Join-Path $env:RUNNER_TEMP "gh-pages"
          git worktree add $pages origin/gh-pages
          New-Item -ItemType Directory -Force -Path (Join-Path $pages "docs") | Out-Null
          Copy-Item -Path .\docs\iphone -Destination (Join-Path $pages "docs") -Recurse -Force
          Copy-Item -Path .\docs\data -Destination (Join-Path $pages "docs") -Recurse -Force
          Copy-Item -Path .\docs\assets -Destination (Join-Path $pages "docs") -Recurse -Force
          Push-Location $pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/iphone docs/data docs/assets
          if (git diff --cached --quiet) {
            Write-Host "No GitHub Pages public data changes."
          } else {
            git commit -m "Publish auto refreshed OKTV data"
            git push origin HEAD:gh-pages
          }
