name: Update LunaTV VOD candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tools/update-lunatv-vod.ps1"
      - ".github/workflows/update-lunatv-vod.yml"
  schedule:
    - cron: "41 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-lunatv-vod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh LunaTV VOD candidate
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\update-lunatv-vod.ps1 `
            -SourceName "jin18" `
            -TimeoutSec 12 `
            -MaxDetailProbe 3

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/vod-lunatv-jin18-oktv.json sources/vod-lunatv-jin18-report.json
          if (git diff --cached --quiet) {
            Write-Host "No LunaTV VOD candidate changes."
          } else {
            git commit -m "Auto update LunaTV VOD candidate"
            git push
          }
