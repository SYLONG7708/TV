name: Update YouTube live sources

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "sources/youtube-live-channels.csv"
      - "sources/live-base.txt"
      - "sources/live-verified-only.txt"
      - "tools/update-youtube-live.ps1"
      - ".github/workflows/update-youtube-live.yml"
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: write

concurrency:
  group: update-youtube-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore optional YouTube cookies
        shell: pwsh
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:YOUTUBE_COOKIES_B64)) {
            $cookieFile = Join-Path $env:RUNNER_TEMP "youtube-cookies.txt"
            [System.IO.File]::WriteAllBytes($cookieFile, [System.Convert]::FromBase64String($env:YOUTUBE_COOKIES_B64))
            "YOUTUBE_COOKIES_FILE=$cookieFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "YouTube cookies restored from repository secret."
          } else {
            Write-Host "YOUTUBE_COOKIES_B64 secret is not set; unresolved YouTube watch URLs will stay out of the playable playlist."
          }

      - name: Refresh YouTube live URLs
        shell: pwsh
        run: |
          $args = @(
            "-NoProfile",
            "-ExecutionPolicy", "Bypass",
            "-File", ".\tools\update-youtube-live.ps1",
            "-DownloadYtDlp",
            "-IncludeOriginalOnFailure",
            "-SocketTimeoutSec", "8",
            "-ProcessTimeoutSec", "12",
            "-RetryCount", "1"
          )
          if (-not [string]::IsNullOrWhiteSpace($env:YOUTUBE_COOKIES_FILE)) {
            $args += @("-CookiesFile", $env:YOUTUBE_COOKIES_FILE)
          } else {
            $args += @("-SkipResolve")
          }
          powershell @args

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/live-stable.txt sources/live-youtube-stable.txt sources/live-youtube-report.json
          if (git diff --cached --quiet) {
            Write-Host "No live source changes."
          } else {
            git commit -m "Auto update YouTube live sources"
            git push
          }
