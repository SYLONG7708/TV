name: Update YouTube live sources

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "sources/youtube-live-channels.csv"
      - "sources/live-base.txt"
      - "tools/update-youtube-live.ps1"
      - ".github/workflows/update-youtube-live.yml"
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: write

concurrency:
  group: update-youtube-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh YouTube live URLs
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\update-youtube-live.ps1 -DownloadYtDlp -IncludeOriginalOnFailure -SocketTimeoutSec 10 -RetryCount 1

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/live-stable.txt sources/live-youtube-stable.txt sources/live-youtube-report.json
          if (git diff --cached --quiet) {
            Write-Host "No live source changes."
          } else {
            git commit -m "Auto update YouTube live sources"
            git push
          }
